version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: pdf_publisher_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: pdf_publisher
      POSTGRES_PASSWORD: pdf_publisher_secret
      POSTGRES_DB: pdf_publisher
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pdf_publisher"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: pdf_publisher_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://pdf_publisher:pdf_publisher_secret@postgres:5432/pdf_publisher
      PORT: 4000
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      UPLOADS_DIR: /app/uploads
      OPS_WEB_URL: ${OPS_WEB_URL:-http://localhost:5173}
      PUBLIC_WEB_URL: ${PUBLIC_WEB_URL:-http://localhost:3000}
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  ops-web:
    build:
      context: ./apps/ops-web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:4000}
    container_name: pdf_publisher_ops
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "5173:80"

  public-web:
    build:
      context: ./apps/public-web
      dockerfile: Dockerfile
      args:
        API_URL: ${API_URL:-http://api:4000}
    container_name: pdf_publisher_public
    restart: unless-stopped
    depends_on:
      - api
    environment:
      API_URL: http://api:4000
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  uploads_data:
